modLoader    = "javafml"
loaderVersion = "[4,)"
license      = "Apache-2.0"

[[mods]]
modId       = "weatherstructuremod"
version     = "${file.jarVersion}"
displayName = "Weather & Structure Mod"
logoFile    = "assets/weatherstructuremod/icon.png"
description = '''
Biome-aware weather cycling (30-60 min), structure boost (+15%),
timed weather & forecast commands. NeoForge edition for Minecraft 1.21.11.
'''

[[dependencies.weatherstructuremod]]
    modId        = "neoforge"
    type         = "required"
    versionRange = "[21.11,)"
    ordering     = "NONE"
    side         = "BOTH"

[[dependencies.weatherstructuremod]]
    modId        = "minecraft"
    type         = "required"
    versionRange = "[1.21.11,)"
    ordering     = "NONE"
    side         = "BOTH"
